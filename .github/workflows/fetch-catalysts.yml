name: Fetch Biotech Catalysts Daily

on:
  schedule:
    - cron: '0 10 * * *'  # Every day at 10am UTC (6am ET)
  workflow_dispatch:        # Also allow manual trigger

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch ClinicalTrials.gov data
        run: node scripts/fetch-trials.js

      - name: Commit updated data
        run: |
          git config --global user.name "Ghost Catalyst Bot"
          git config --global user.email "bot@ghostofstocktwits.com"
          git add data/trials.json
          git diff --staged --quiet || git commit -m "Auto-update: catalyst data $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
